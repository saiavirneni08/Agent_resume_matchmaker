version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: resume-agent-postgres
    environment:
      - POSTGRES_DB=resume_agent
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: resume-agent-backend
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/resume_agent
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: resume-agent-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
